replicaCount: 2

image:
  repository: ghcr.io/org/service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false

serviceAccount:
  create: true
  name: ""

externalSecrets:
  enabled: true
  secretStoreName: vault-backend
