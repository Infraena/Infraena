{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "idp.fullname" . }}-web
  labels: {{- include "idp.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "idp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
{{- end }}
