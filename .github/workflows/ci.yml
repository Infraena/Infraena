name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - run: pnpm turbo lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - run: pnpm turbo lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: infraena_test
          POSTGRES_USER: infraena
          POSTGRES_PASSWORD: infraena
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://infraena:infraena@localhost:5432/infraena_test
      REDIS_URL: redis://localhost:6379
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: root
      JWT_SECRET: test-jwt-secret-for-ci-minimum-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Prisma migrations
        run: pnpm db:migrate
      - name: Create .env for tests
        run: |
          cat > apps/api/.env << 'ENVEOF'
          DATABASE_URL=postgresql://infraena:infraena@localhost:5432/infraena_test
          REDIS_URL=redis://localhost:6379
          VAULT_ADDR=http://localhost:8200
          VAULT_TOKEN=root
          JWT_SECRET=test-jwt-secret-for-ci-minimum-32-characters-long
          ENVEOF
      - run: pnpm turbo test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - run: pnpm turbo build
